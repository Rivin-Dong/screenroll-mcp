startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      token:
        type: string
        description: From ScreenRoll extension → MCP Pairing after Generate pairing token & enable bridge (required).
    required: [token]
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@screenroll/mcp', '--token', config.token],
    })
